# Render 一键部署配置（免费版）
# 用法：
#   1. 将代码 push 到 GitHub 仓库
#   2. 打开 https://dashboard.render.com → New → Blueprint
#   3. 选择仓库 → 一路确认 → 等几分钟自动拿到网址
services:
  - type: web
    name: texas-poker
    runtime: node
    plan: free
    branch: main
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /
    # Render 会自动注入 PORT 环境变量，server.js 已支持
    envVars:
      - key: NODE_ENV
        value: production
